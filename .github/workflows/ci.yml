name: CI

on: 
  pull_request:
  push:
    branches:
      - main
      - deploy
    
jobs: 
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build applications
        run: npm run build